name: kf-talentsuite-platform-agent-backend-build
run-name: kf-talentsuite-platform-agent-backend-build-${{ inputs.environment }}-${{ inputs.region }}

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Environment"
        required: true
        default: dev
        options:
          - sbx
          - dev
          - qa1
      region:
        type: choice
        description: "AWS Region"
        required: true
        default: us-east-1
        options:
          - us-east-1
          - eu-central-1
          - eu-west-1
          - us-west-2
      patchNumber:
        description: "Patch number for the release (e.g. rc/v24.1.0.0-api-123456789)"
        required: true
        default: '0'
      serviceName:
        type: string
        description: "Service component tag (e.g. api)"
        required: false
        default: 'api'

jobs:
  Build:
    uses: HayGroup/kfone-common/.github/workflows/docker-build-push-0.0.1.yml@main
    secrets: inherit
    with:
      dockerBaseImage: "python:3.12-slim"
      dockerRepository: "kfone-idp-agent/api"
      environment: "${{ inputs.environment }}"
      workspace: "."

  Tagging:
    name: Build Tag
    needs: [Build]
    if: ${{ inputs.environment == 'qa1' }}
    uses: HayGroup/kfone-common/.github/workflows/create-build-tag-0.0.1.yml@main
    secrets: inherit
    with:
      environment: "${{ inputs.environment }}"
      region: "${{ inputs.region }}"
      imageTag: "${{ needs.Build.outputs.imageTag }}"
      patchNumber: ${{ inputs.patchNumber }}
      serviceName: ${{ inputs.serviceName }}
