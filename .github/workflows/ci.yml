name: kf-talentsuite-platform-agent-ci
run-name: kf-talentsuite-platform-agent-ci

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
      - 'rc/v**'
  push:
    branches:
      - main
      - develop
      - 'rc/v**'

jobs:
  Lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

  Test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: iam_db
          POSTGRES_USER: iam_user
          POSTGRES_PASSWORD: iam_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iam_user -d iam_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Initialise database
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: iam_user
          PGPASSWORD: iam_pass
          PGDATABASE: iam_db
        run: |
          psql -c "CREATE SCHEMA IF NOT EXISTS idp_agent;"
          psql -c "ALTER ROLE iam_user SET search_path TO idp_agent, public;"
          for f in yuniql/scripts/v0.00/*.sql; do psql -f "$f"; done

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: iam_db
          DB_USER: iam_user
          DB_PASSWORD: iam_pass
          KEYCLOAK_ENABLED: 'false'
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html -v || echo "No tests found — skipping"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7

  FrontendLint:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_KEYCLOAK_ENABLED: 'false'
        run: npm run build
